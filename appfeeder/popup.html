<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appfeeder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #111; background: #fff; }
    header { padding: 12px 14px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 8px; }
    header h1 { font-size: 14px; font-weight: 600; flex: 1; }
    .status { padding: 12px 14px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
    .dot.connected { background: #22c55e; }
    .status-text { color: #6b7280; }
    .section { padding: 12px 14px; border-top: 1px solid #e5e5e5; }
    .section label { display: block; font-weight: 500; margin-bottom: 6px; color: #374151; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 5px;
      font-size: 12px; font-family: monospace; color: #374151;
    }
    input:focus { outline: none; border-color: #6366f1; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .hint a { color: #6366f1; text-decoration: none; }
    button.save {
      width: 100%; padding: 7px; margin-top: 10px; background: #6366f1;
      color: #fff; border: none; border-radius: 5px; font-size: 13px;
      font-weight: 500; cursor: pointer;
    }
    button.save:hover { background: #4f46e5; }
    button.clear {
      width: 100%; padding: 7px; margin-top: 6px; background: transparent;
      color: #9ca3af; border: 1px solid #e5e5e5; border-radius: 5px; font-size: 12px;
      cursor: pointer;
    }
    button.clear:hover { color: #ef4444; border-color: #ef4444; }
    footer { padding: 8px 14px; border-top: 1px solid #e5e5e5; text-align: center; }
    footer a { font-size: 11px; color: #9ca3af; text-decoration: none; }
    footer a:hover { color: #6366f1; }
  </style>
</head>
<body>
  <header>
    <h1>Appfeeder</h1>
  </header>

  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Checking…</span>
  </div>

  <div class="section">
    <label for="jwt-input">Session token</label>
    <input type="password" id="jwt-input" placeholder="eyJ…" autocomplete="off" />
    <p class="hint">
      Get yours at
      <a href="https://mos2es.xyz/profile/settings" target="_blank">mos2es.xyz/profile/settings</a>
      → "Show session token"
    </p>
    <button class="save" id="save-btn">Save & connect</button>
    <button class="clear" id="clear-btn">Clear saved token</button>
  </div>

  <footer>
    <a href="https://mos2es.xyz" target="_blank" rel="noopener noreferrer">mos2es.xyz</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
