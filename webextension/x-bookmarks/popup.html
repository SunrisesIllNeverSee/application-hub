<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Bookmarks Export</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 340px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { padding: 16px; }
    h1 { margin: 0 0 4px; font-size: 18px; }
    p { margin: 0 0 14px; font-size: 12px; line-height: 1.5; color: #94a3b8; }
    label { display: block; margin: 12px 0 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #cbd5e1; }
    select {
      width: 100%;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 9px 10px;
      background: #111827;
      color: #e2e8f0;
      font: inherit;
    }
    .stack { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { background: #38bdf8; color: #082f49; }
    .secondary { background: #1e293b; color: #e2e8f0; }
    #status { min-height: 18px; margin-top: 12px; font-size: 12px; color: #7dd3fc; }
    .hint { font-size: 11px; color: #64748b; line-height: 1.5; }
  </style>
</head>
<body>
  <main>
    <h1>X Bookmarks Export</h1>
    <p>Export the loaded bookmarks page into Markdown or JSON so you can sort the dump in VS Code.</p>

    <label for="sort-mode">Sort mode</label>
    <select id="sort-mode">
      <option value="page">Page order</option>
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="author">Author</option>
    </select>

    <div class="stack">
      <button id="download-md" class="primary" type="button">Download Markdown</button>
      <button id="download-json" class="secondary" type="button">Download JSON</button>
    </div>

    <p class="hint">Open `x.com/i/bookmarks` while signed in. The extension only reads the currently loaded items on the page.</p>
    <div id="status"></div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
