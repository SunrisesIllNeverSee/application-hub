          - generic [ref=e2213]:
            - generic [ref=e2214]:
              - heading "What is the Artificial Analysis Coding Agent Index?" [level=3] [ref=e2215]:
                - button "What is the Artificial Analysis Coding Agent Index?" [ref=e2216] [cursor=pointer]:
                  - text: What is the Artificial Analysis Coding Agent Index?
                  - img [ref=e2217]
              - region "What is the Artificial Analysis Coding Agent Index?":
                - paragraph [ref=e2220]: The Artificial Analysis Coding Agent Index is our composite score for coding-agent performance across the public benchmark suite on this page. It currently combines SWE-Bench-Pro-Hard-AA, Terminal-Bench v2, and SWE-Atlas-QnA to capture implementation, terminal workflow, and repository-understanding performance in a single headline metric.
            - generic [ref=e2221]:
              - heading "Which benchmarks are included in the index right now?" [level=3] [ref=e2222]:
                - button "Which benchmarks are included in the index right now?" [ref=e2223] [cursor=pointer]:
                  - text: Which benchmarks are included in the index right now?
                  - img [ref=e2224]
              - region "Which benchmarks are included in the index right now?":
                - paragraph [ref=e2227]: The current public index includes SWE-Bench-Pro-Hard-AA, Terminal-Bench v2, and SWE-Atlas-QnA. These benchmarks are combined because they stress different parts of the coding-agent workflow rather than repeating the same task format.
            - generic [ref=e2228]:
              - heading "What kinds of tasks are these benchmarks actually testing?" [level=3] [ref=e2229]:
                - button "What kinds of tasks are these benchmarks actually testing?" [ref=e2230] [cursor=pointer]:
                  - text: What kinds of tasks are these benchmarks actually testing?
                  - img [ref=e2231]
              - region "What kinds of tasks are these benchmarks actually testing?":
                - paragraph [ref=e2234]: The public benchmark suite mixes several software engineering task styles. Some tasks are Q&A and repository-understanding tasks that focus on reading a codebase, understanding architecture or behavior, and producing a correct technical answer. Some are implementation and bug-fix tasks that require code changes and are closer to the classic make-a-patch-that-works framing. Some are terminal workflow tasks that test whether the agent can navigate a shell-driven environment, execute tools correctly, and complete a multi-step command-line workflow. The suite also mixes effectively binary outcomes with rubric-scored partial-credit outcomes, which matters because an agent can show useful progress on a difficult task without fully solving it.
            - generic [ref=e2235]:
              - heading "How do Q&A-style tasks differ from SWE-Bench-Pro-Hard-AA-style tasks?" [level=3] [ref=e2236]:
                - button "How do Q&A-style tasks differ from SWE-Bench-Pro-Hard-AA-style tasks?" [ref=e2237] [cursor=pointer]:
                  - text: How do Q&A-style tasks differ from SWE-Bench-Pro-Hard-AA-style tasks?
                  - img [ref=e2238]
              - region "How do Q&A-style tasks differ from SWE-Bench-Pro-Hard-AA-style tasks?":
                - paragraph [ref=e2241]: "Q&A-style tasks emphasize repository understanding, code reading, tracing behavior, and producing a correct technical explanation. SWE-Bench-Pro-Hard-AA-style tasks are closer to shipping a working change: the agent has to understand the task, navigate the repository, edit files correctly, and satisfy an evaluator or test-based outcome under execution constraints. Those are related capabilities, but they are not identical. An agent can be strong at repository reasoning and still be weaker at reliable patch execution, or vice versa, which is one reason the composite index should be interpreted alongside the per-benchmark chart."
            - generic [ref=e2242]:
              - heading "How are agents scored on each benchmark?" [level=3] [ref=e2243]:
                - button "How are agents scored on each benchmark?" [ref=e2244] [cursor=pointer]:
                  - text: How are agents scored on each benchmark?
                  - img [ref=e2245]
              - region "How are agents scored on each benchmark?":
                - paragraph [ref=e2248]: "The benchmark page reports component scores using average pass@1. This is the evaluator-assigned score for a task, and depending on the benchmark it can be either binary or partial credit. A passed run is not automatically the same thing as a solved task: a run can complete cleanly and still receive a zero score. In the current methodology, a task is counted as solved only when it passed and received a positive score. This matters especially for rubric-scored tasks such as SWE-Atlas-QnA, where partial credit can capture useful progress that would be lost in a strict pass-fail metric."
            - generic [ref=e2249]:
              - heading "How is the overall index weighted?" [level=3] [ref=e2250]:
                - button "How is the overall index weighted?" [ref=e2251] [cursor=pointer]:
                  - text: How is the overall index weighted?
                  - img [ref=e2252]
              - region "How is the overall index weighted?":
                - paragraph [ref=e2255]: The index is computed from the configured benchmark components that make up the current public suite. For the current Artificial Analysis Coding Agent Index, the public methodology is a simple average across the available component benchmark scores, and the current configuration treats the included benchmark components as equal components of that composite. Benchmark methodology can evolve as coverage improves, so comparability is best interpreted within the published benchmark suite and its current component set rather than as a timeless absolute score.
            - generic [ref=e2256]:
              - heading "What does execution time mean?" [level=3] [ref=e2257]:
                - button "What does execution time mean?" [ref=e2258] [cursor=pointer]:
                  - text: What does execution time mean?
                  - img [ref=e2259]
              - region "What does execution time mean?":
                - paragraph [ref=e2262]: Execution time on this page refers to wall-clock task runtime per task, not just raw model latency. It is meant to reflect the user-facing time cost of running the whole agent workflow. That includes time spent reasoning, issuing tool calls, reading and writing files, executing shell steps, and waiting on model responses. So an agent can have a fast underlying model and still be slower overall if its workflow is longer or more tool-heavy.
            - generic [ref=e2263]:
              - heading "What does token usage mean, and why does it matter?" [level=3] [ref=e2264]:
                - button "What does token usage mean, and why does it matter?" [ref=e2265] [cursor=pointer]:
                  - text: What does token usage mean, and why does it matter?
                  - img [ref=e2266]
              - region "What does token usage mean, and why does it matter?":
                - paragraph [ref=e2269]: Token usage is the average observed token consumption per task across the benchmark suite. On this page we break it out into input, cache, and output tokens. Input tokens are the tokens sent into the model, including prompts, instructions, tool context, and task context. Cache tokens are prompt tokens reused through prompt caching when the provider exposes that telemetry. Output tokens are tokens generated by the model in its response. Token usage matters because it often drives cost and can also indicate how much context an agent consumes to get work done, but token efficiency and cost are not identical because providers price token categories differently and caching can materially change the bill.
            - generic [ref=e2270]:
              - heading "Why can a higher-index agent still be worse for my use case?" [level=3] [ref=e2271]:
                - button "Why can a higher-index agent still be worse for my use case?" [ref=e2272] [cursor=pointer]:
                  - text: Why can a higher-index agent still be worse for my use case?
                  - img [ref=e2273]
              - region "Why can a higher-index agent still be worse for my use case?":
                - paragraph [ref=e2276]: A higher index score means stronger performance across the included benchmark mix, but it does not mean the agent is best for every workflow. The index is a balance across benchmark quality, not a direct measure of your specific latency, cost, tooling, or task-type priorities. Real-world choice still depends on whether your workflow looks more like repository Q&A, patching, or terminal execution, and on practical constraints such as IDE integration, model availability, and reliability.
            - generic [ref=e2277]:
              - heading "How realistic are these tasks, and what setup was used for each agent?" [level=3] [ref=e2278]:
                - button "How realistic are these tasks, and what setup was used for each agent?" [ref=e2279] [cursor=pointer]:
                  - text: How realistic are these tasks, and what setup was used for each agent?
                  - img [ref=e2280]
              - region "How realistic are these tasks, and what setup was used for each agent?":
                - paragraph [ref=e2283]:
                  - text: "These benchmarks measure coding-agent performance across repositories, tools, multi-step workflows, and evaluator-based outcomes. Results on this page reflect specific evaluated agent variants, not just generic product names: model choice, settings, and execution configuration can materially change outcomes, which is why a single agent family may appear in multiple variants in the results. For more background on benchmark runs, task-level scoring, and methodology, see the coding-agents benchmarking methodology page."
