name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ── Registry + coordination check (strict) ──────────────────────────────────
  # Blocks merges on any registry inconsistency — drift, collision, stale claims.
  # Must pass before the other jobs matter.
  agent-check:
    name: Agent registry check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run strict registry check
        run: python3 .agents/check.py --strict

  # ── MCP server ───────────────────────────────────────────────────────────────
  mcp-server:
    name: MCP server
    runs-on: ubuntu-latest
    needs: agent-check

    defaults:
      run:
        working-directory: application-hub-mcp-server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: application-hub-mcp-server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  # ── Next.js app ──────────────────────────────────────────────────────────────
  next-app:
    name: Next.js app
    runs-on: ubuntu-latest
    needs: agent-check

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run type-check
      - name: Build
        run: npm run build
