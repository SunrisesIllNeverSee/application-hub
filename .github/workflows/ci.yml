name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mcp-server:
    name: MCP server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: application-hub-mcp-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: application-hub-mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  next-app:
    name: Next.js app
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run type-check

      - name: Build
        run: npm run build
